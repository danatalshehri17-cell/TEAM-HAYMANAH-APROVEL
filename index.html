<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بطاقة عضوية – فريق هيمنة النجاح</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #0d3d3d 0%, #0a5c5c 50%, #0d7a7a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 16px;
    }

    h1 {
      color: #fff;
      font-size: 2rem;
      font-weight: 900;
      text-align: center;
      margin-bottom: 6px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.4);
    }
    .subtitle {
      color: #7fffff;
      font-size: 1rem;
      text-align: center;
      margin-bottom: 30px;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 30px;
      width: 100%;
      max-width: 600px;
      align-items: center;
    }

    /* ===== Form ===== */
    .form-box {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      padding: 32px 28px;
      width: 100%;
    }

    .form-box h2 {
      color: #fff;
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 24px;
      text-align: center;
    }

    .field-group {
      margin-bottom: 20px;
      position: relative;
      padding-right: 40px;
    }

    .field-group .step-num {
      position: absolute;
      right: 0;
      top: 0;
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, #2ee8e8, #0aabab);
      color: #0a3d3d;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 900;
    }

    .field-group label {
      display: block;
      color: #b2ffff;
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .field-group input,
    .field-group select {
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px;
      border: 1.5px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 1rem;
      font-family: 'Cairo', sans-serif;
      outline: none;
      transition: border-color 0.25s, background 0.25s;
      direction: rtl;
    }
    .field-group input::placeholder { color: rgba(255,255,255,0.45); }
    .field-group input:focus,
    .field-group select:focus {
      border-color: #2ee8e8;
      background: rgba(255,255,255,0.18);
    }
    .field-group select option { color: #000; background: #fff; }

    /* Multi-select dropdown */
    .multi-select {
      position: relative;
    }
    .multi-select-btn {
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px;
      border: 1.5px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.45);
      font-size: 1rem;
      font-family: 'Cairo', sans-serif;
      text-align: right;
      cursor: pointer;
      transition: border-color 0.25s, background 0.25s;
      direction: rtl;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .multi-select-btn.has-value { color: #fff; }
    .multi-select-btn:hover,
    .multi-select-btn.open {
      border-color: #2ee8e8;
      background: rgba(255,255,255,0.18);
    }
    .multi-select-btn .arrow { font-size: 0.7rem; transition: transform 0.25s; }
    .multi-select-btn.open .arrow { transform: rotate(180deg); }
    .multi-select-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0; left: 0;
      background: rgba(15,60,60,0.97);
      backdrop-filter: blur(16px);
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      padding: 8px;
      z-index: 100;
      max-height: 220px;
      overflow-y: auto;
    }
    .multi-select-dropdown.show { display: block; }
    .multi-select-dropdown label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      color: #fff;
      font-size: 0.92rem;
      font-weight: 600;
      transition: background 0.2s;
      margin-bottom: 0;
    }
    .multi-select-dropdown label:hover { background: rgba(46,232,232,0.12); }
    .multi-select-dropdown input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: #2ee8e8;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Photo upload */
    .photo-upload-area {
      border: 2px dashed rgba(255,255,255,0.35);
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.25s, background 0.25s;
      background: rgba(255,255,255,0.05);
    }
    .photo-upload-area:hover { border-color: #2ee8e8; background: rgba(46,232,232,0.08); }
    .photo-upload-area .icon { font-size: 2rem; margin-bottom: 6px; }
    .photo-upload-area p { color: rgba(255,255,255,0.65); font-size: 0.85rem; }
    .photo-upload-area input { display: none; }
    #photo-preview-thumb {
      width: 80px; height: 80px;
      border-radius: 10px;
      object-fit: cover;
      margin: 0 auto 6px;
      display: none;
      border: 2px solid #2ee8e8;
    }

    /* Default avatar (man / woman) picker */
    .avatar-picker-wrap {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.12);
    }
    .avatar-picker-wrap > .sub-label {
      display: block;
      color: #b2ffff;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 10px;
      text-align: center;
    }
    .avatar-picker {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .avatar-picker button {
      flex: 1;
      min-width: 120px;
      max-width: 200px;
      padding: 12px 10px 14px;
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.06);
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .avatar-picker button img {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.2);
    }
    .avatar-picker button span {
      color: rgba(255,255,255,0.85);
      font-size: 0.88rem;
      font-weight: 700;
    }
    .avatar-picker button:hover {
      border-color: rgba(46,232,232,0.5);
      background: rgba(46,232,232,0.08);
    }
    .avatar-picker button.active {
      border-color: #2ee8e8;
      background: rgba(46,232,232,0.14);
      box-shadow: 0 0 0 1px rgba(46,232,232,0.35);
    }
    .avatar-picker button.active span { color: #fff; }
    .avatar-picker-hint {
      text-align: center;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.45);
      margin-top: 10px;
      line-height: 1.4;
    }

    /* Orientation toggle */
    .orientation-toggle {
      display: flex;
      gap: 10px;
    }
    .orientation-toggle button {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
      font-family: 'Cairo', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
    }
    .orientation-toggle button.active {
      background: #2ee8e8;
      border-color: #2ee8e8;
      color: #0a3d3d;
    }

    .btn-download {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #2ee8e8, #0aabab);
      color: #0a3d3d;
      font-family: 'Cairo', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      transition: opacity 0.25s, transform 0.2s;
      box-shadow: 0 4px 20px rgba(46,232,232,0.35);
    }
    .btn-download:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-download:active { transform: translateY(0); }

    /* ===== Card Preview ===== */
    .preview-box {
      width: 100%;
    }
    .preview-box.preview-inline {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.15);
    }
    .preview-box h2 {
      color: #fff;
      font-size: 1.1rem;
      text-align: center;
      margin-bottom: 16px;
      font-weight: 600;
    }

    .card-wrapper {
      position: relative;
      display: inline-block;
      width: 100%;
    }

    /* ---- Horizontal card ---- */
    #card-h {
      position: relative;
      width: 100%;
      aspect-ratio: 1063 / 650;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 50px rgba(0,0,0,0.5);
    }
    #card-h img.card-bg {
      width: 100%; height: 100%;
      /* fill يطابق مساحة الـ canvas حرفياً ولا يقصّ الصورة كخلفية */
      object-fit: fill;
      display: block;
      border-radius: 16px;
    }
    /* ---- Vertical card ---- */
    #card-v {
      position: relative;
      width: 100%;
      aspect-ratio: 1240 / 1748;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 50px rgba(0,0,0,0.5);
      display: none;
    }
    #card-v img.card-bg {
      width: 100%; height: 100%;
      object-fit: fill;
      display: block;
      border-radius: 16px;
    }
    /* Canvas overlays */
    #canvas-h, #canvas-v {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      border-radius: 16px;
    }
    @media (max-width: 700px) {
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <h1>بطاقة عضوية</h1>
  <p class="subtitle">فريق هيمنة النجاح</p>

  <div class="container">

    <!-- ===== FORM ===== -->
    <div class="form-box">
      <h2>أدخل بياناتك</h2>

      <!-- Orientation -->
      <div class="field-group">
        <span class="step-num">1</span>
        <label>اختر شكل البطاقة</label>
        <div class="orientation-toggle">
          <button id="btn-h" class="active" onclick="setOrientation('h')">أفقي</button>
          <button id="btn-v" onclick="setOrientation('v')">رأسي</button>
        </div>
        <div class="preview-box preview-inline">
        <h2>معاينة البطاقة</h2>
        
        <!-- Horizontal Card -->
        <div class="card-wrapper">
          <div id="card-h">
            <img class="card-bg" src="cards/card-h.png" alt="" />
            <canvas id="canvas-h"></canvas>
          </div>
        
          <!-- Vertical Card -->
          <div id="card-v">
            <img class="card-bg" src="cards/card-v.png" alt="" />
            <canvas id="canvas-v"></canvas>
          </div>
        </div>
        </div>
      </div>

      <!-- Photo -->
      <div class="field-group">
        <span class="step-num">2</span>
        <label>الصورة الشخصية</label>
        <div class="photo-upload-area" onclick="document.getElementById('photo-input').click()">
          <img id="photo-preview-thumb" src="" alt="" />
          <div class="icon">📷</div>
          <p>اضغط لرفع صورتك الشخصية</p>
          <input type="file" id="photo-input" accept="image/*" onchange="loadPhoto(event)" />
        </div>
        <div class="avatar-picker-wrap">
          <span class="sub-label">أو اختر صورة افتراضية للبطاقة</span>
          <div class="avatar-picker" role="group" aria-label="صورة افتراضية">
            <button type="button" id="avatar-btn-man" class="active" onclick="setAvatarPlaceholder('man')">
              <img src="cards/man.png" alt="" width="64" height="64" />
              <span>مهيمن</span>
            </button>
            <button type="button" id="avatar-btn-woman" onclick="setAvatarPlaceholder('woman')">
              <img src="cards/womon.png" alt="" width="64" height="64" />
              <span>مهيمنة</span>
            </button>
          </div>
          <p class="avatar-picker-hint">تُعرض في مكان الصورة على البطاقة إذا لم ترفع صورة؛ وعند رفع صورتك تُستخدم صورتك بدلها.</p>
        </div>
      </div>

      <!-- Name -->
      <div class="field-group">
        <span class="step-num">3</span>
        <label>الاسم</label>
        <input type="text" id="inp-name" placeholder="أدخل الاسم الكامل" oninput="updateCard()" />
      </div>

      <!-- Dept -->
      <div class="field-group">
        <span class="step-num">4</span>
        <label>القسم</label>
        <div class="multi-select" id="dept-multi">
          <div class="multi-select-btn" onclick="toggleDeptDropdown()">
            <span id="dept-display">-- اختر القسم --</span>
            <span class="arrow">▼</span>
          </div>
          <div class="multi-select-dropdown" id="dept-dropdown">
            <label><input type="checkbox" value="فرسان هيمنة" onchange="updateDeptSelection()"> فرسان هيمنة</label>
            <label><input type="checkbox" value="العلاقات العامة" onchange="updateDeptSelection()"> العلاقات العامة</label>
            <label><input type="checkbox" value="إبداع هيمنة" onchange="updateDeptSelection()"> إبداع هيمنة</label>
            <label><input type="checkbox" value="اكاديمية هيمنة" onchange="updateDeptSelection()"> اكاديمية هيمنة</label>
            <label><input type="checkbox" value="صوت هيمنة" onchange="updateDeptSelection()"> صوت هيمنة</label>
            <label><input type="checkbox" value="كتاب هيمنة" onchange="updateDeptSelection()"> كتاب هيمنة</label>
            <label><input type="checkbox" value="رادار هيمنة" onchange="updateDeptSelection()"> رادار هيمنة</label>
            <label><input type="checkbox" value="مطورين هيمنة" onchange="updateDeptSelection()"> مطورين هيمنة</label>
            <label><input type="checkbox" value="مسوقين هيمنة" onchange="updateDeptSelection()"> مسوقين هيمنة</label>
          </div>
        </div>
      </div>

      <!-- Rank -->
      <div class="field-group">
        <span class="step-num">5</span>
        <label>الرتبة</label>
        <select id="inp-rank" onchange="updateCard()">
          <option value="">-- اختر الرتبة --</option>
          <option value="مشرف">مشرف</option>
          <option value="قائد">قائد</option>
          <option value="عضو">عضو</option>
        </select>
      </div>
      <button class="btn-download" onclick="downloadCard()">⬇ تحميل البطاقة</button>
    </div>



    <script>
    const POS = {
      h: {
        cw:1063, ch:650,
        name:  { x:270, y:270, maxW:380 },
        dept:  { x:270, y:390, maxW:380 },
        rank:  { x:355, y:525, maxW:220 },
        /* فتحة الصورة من card-h.png: 749–1019 × 110–336 (271×227) */
        photo: { x:749, y:110, w:271, h:227, r:14, fit: 'coverTop', nudgeY: 144 },
        fs: 28
      },
      v: {
        cw:1240, ch:1748,
        name:  { x:320, y:475, maxW:480 },
        dept:  { x:320, y:720, maxW:480 },
        rank:  { x:380, y:938, maxW:320 },
        /* محاذاة مع مربع الصورة في card-v.png (يغطي كامل المنطقة السوداء) */
        photo: { x:782, y:326, w:412, h:516, r:36 },
        fs: 36
      }
    };

    let orientation = 'h';
    let photoImg    = null;
    /** 'man' | 'woman' — يُستخدم عند عدم رفع صورة شخصية */
    let avatarPlaceholder = 'man';
    let avatarManImg = null;
    let avatarWomanImg = null;

    function setAvatarPlaceholder(which) {
      avatarPlaceholder = which;
      document.getElementById('avatar-btn-man').classList.toggle('active', which === 'man');
      document.getElementById('avatar-btn-woman').classList.toggle('active', which === 'woman');
      updateCard();
    }

    function getPlaceholderImg() {
      if (avatarPlaceholder === 'woman') return avatarWomanImg;
      return avatarManImg;
    }

    function isUserPhotoActive() {
      return !!(photoImg && photoImg.complete && photoImg.naturalWidth);
    }

    /** صورة للرسم: رفع المستخدم أو الافتراضية */
    function getPhotoLayerImage() {
      if (photoImg && photoImg.complete && photoImg.naturalWidth) return photoImg;
      const ph = getPlaceholderImg();
      if (ph && ph.complete && ph.naturalWidth) return ph;
      return null;
    }

    /**
     * مثل object-fit: cover داخل dx,dy,dw,dh
     * alignY: 'center' | 'top' | 'bottom' — للأفقي نستخدم top لإظهار الوجه وعدم قصّ نصف الصورة من الأعلى
     */
    function drawImageCover(ctx, img, dx, dy, dw, dh, alignY, nudgeY) {
      const sw = img.naturalWidth, sh = img.naturalHeight;
      if (!sw || !sh) return;
      const scale = Math.max(dw / sw, dh / sh);
      const bw = sw * scale, bh = sh * scale;
      const ox = dx + (dw - bw) / 2;
      let oy = dy + (dh - bh) / 2;
      if (alignY === 'top') oy = dy;
      else if (alignY === 'bottom') oy = dy + dh - bh;
      if (nudgeY) oy += nudgeY;
      /* +1px bleed يقلل فراغات تحت القص */
      ctx.drawImage(img, 0, 0, sw, sh, ox - 0.5, oy - 0.5, bw + 1, bh + 1);
    }

    function drawPhotoInSlot(ctx, p) {
      const layerImg = getPhotoLayerImage();
      if (!layerImg) return;
      ctx.save();
      ctx.beginPath();
      const pr = p.photo.r != null ? p.photo.r : 8;
      if (ctx.roundRect) ctx.roundRect(p.photo.x, p.photo.y, p.photo.w, p.photo.h, pr);
      else               ctx.rect(p.photo.x, p.photo.y, p.photo.w, p.photo.h);
      ctx.clip();
      let ay = p.photo.fit === 'coverTop' ? 'top' : 'center';
      /* أفقي + مهيمن/مهيمنة: محاذاة من الأسفل لرفع ظهور الجزء السفلي من الرسم داخل الإطار */
      const isHorizontal = p.cw === 1063 && p.ch === 650;
      if (isHorizontal && !isUserPhotoActive()) ay = 'bottom';
      const nudgeY = p.photo.nudgeY != null ? p.photo.nudgeY : 0;
      drawImageCover(ctx, layerImg, p.photo.x, p.photo.y, p.photo.w, p.photo.h, ay, nudgeY);
      ctx.restore();
    }

    function getSelectedDeptsList() {
      const checks = document.querySelectorAll('#dept-dropdown input[type="checkbox"]:checked');
      return Array.from(checks).map(c => c.value);
    }

    function getSelectedDepts() {
      return getSelectedDeptsList().join(' + ');
    }

    function drawDeptLines(ctx, p) {
      const depts = getSelectedDeptsList();
      if (depts.length === 0) return;
      const lineGap = Math.round(p.fs * 1.3);
      if (depts.length <= 2) {
        const text = depts.join(' + ');
        const fs = text.length > 25 ? Math.round(p.fs * 0.7) : text.length > 15 ? Math.round(p.fs * 0.85) : p.fs;
        ctx.font = `bold ${fs}px Cairo, Arial, sans-serif`;
        ctx.fillText(text, p.dept.x, p.dept.y, p.dept.maxW);
      } else {
        const line1 = depts.slice(0, 2).join(' + ');
        const line2 = depts.slice(2).join(' + ');
        const fs1 = line1.length > 25 ? Math.round(p.fs * 0.65) : Math.round(p.fs * 0.8);
        const fs2 = line2.length > 25 ? Math.round(p.fs * 0.65) : Math.round(p.fs * 0.8);
        ctx.font = `bold ${fs1}px Cairo, Arial, sans-serif`;
        ctx.fillText(line1, p.dept.x, p.dept.y - lineGap / 2, p.dept.maxW);
        ctx.font = `bold ${fs2}px Cairo, Arial, sans-serif`;
        ctx.fillText(line2, p.dept.x, p.dept.y + lineGap / 2, p.dept.maxW);
      }
    }

    function toggleDeptDropdown() {
      const btn = document.querySelector('.multi-select-btn');
      const dd  = document.getElementById('dept-dropdown');
      btn.classList.toggle('open');
      dd.classList.toggle('show');
    }

    function updateDeptSelection() {
      const dept = getSelectedDepts();
      const display = document.getElementById('dept-display');
      const btn = document.querySelector('.multi-select-btn');
      if (dept) {
        display.textContent = dept;
        btn.classList.add('has-value');
      } else {
        display.textContent = '-- اختر القسم --';
        btn.classList.remove('has-value');
      }
      updateCard();
    }

    document.addEventListener('click', e => {
      const multi = document.getElementById('dept-multi');
      if (!multi.contains(e.target)) {
        document.querySelector('.multi-select-btn').classList.remove('open');
        document.getElementById('dept-dropdown').classList.remove('show');
      }
    });

    function setOrientation(o) {
      orientation = o;
      document.getElementById('card-h').style.display = o==='h' ? 'block' : 'none';
      document.getElementById('card-v').style.display = o==='v' ? 'block' : 'none';
      document.getElementById('btn-h').classList.toggle('active', o==='h');
      document.getElementById('btn-v').classList.toggle('active', o==='v');
      render();
    }
    function drawOnCanvas(cvs, p) {
      cvs.width  = p.cw;
      cvs.height = p.ch;
      const ctx = cvs.getContext('2d');
      ctx.clearRect(0, 0, p.cw, p.ch);

      // Photo (رفع المستخدم أو الصورة الافتراضية مهيمن/مهيمنة)
      drawPhotoInSlot(ctx, p);

      // Text
      const name = document.getElementById('inp-name').value.trim();
      const dept = getSelectedDepts();
      const rank = document.getElementById('inp-rank').value;
      if (!name && !dept && !rank) return;

      ctx.fillStyle    = '#ffffff';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor  = 'rgba(0,0,0,0.7)';
      ctx.shadowBlur   = 6;

      ctx.font = `bold ${p.fs}px Cairo, Arial, sans-serif`;
      if (name) ctx.fillText(name, p.name.x, p.name.y, p.name.maxW);
      if (rank) ctx.fillText(rank, p.rank.x, p.rank.y, p.rank.maxW);

      drawDeptLines(ctx, p);
    }

    function render() {
      drawOnCanvas(document.getElementById('canvas-h'), POS.h);
      drawOnCanvas(document.getElementById('canvas-v'), POS.v);
    }

    function updateCard() { render(); }

    function loadPhoto(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const thumb = document.getElementById('photo-preview-thumb');
        thumb.src = e.target.result;
        thumb.style.display = 'block';
        photoImg = new Image();
        photoImg.onload = render;
        photoImg.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function downloadCard() {
      const s  = orientation;
      const p  = POS[s];
      const dl = document.createElement('canvas');
      dl.width  = p.cw;
      dl.height = p.ch;
      const ctx = dl.getContext('2d');
      const bg  = document.querySelector(`#card-${s} img.card-bg`);

      const finish = () => {
        ctx.drawImage(bg, 0, 0, p.cw, p.ch);
        drawPhotoInSlot(ctx, p);
        const name = document.getElementById('inp-name').value.trim();
        const dept = getSelectedDepts();
        const rank = document.getElementById('inp-rank').value;
        ctx.fillStyle    = '#ffffff';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor  = 'rgba(0,0,0,0.7)';
        ctx.shadowBlur   = 6;
        ctx.font = `bold ${p.fs}px Cairo, Arial, sans-serif`;
        if (name) ctx.fillText(name, p.name.x, p.name.y, p.name.maxW);
        if (rank) ctx.fillText(rank, p.rank.x, p.rank.y, p.rank.maxW);
        drawDeptLines(ctx, p);

        const link = document.createElement('a');
        link.download = `بطاقة_${name||'عضو'}_هيمنة_النجاح.png`;
        link.href = dl.toDataURL('image/png');
        link.click();
      };

      if (bg.complete && bg.naturalWidth > 0) finish();
      else { bg.crossOrigin='anonymous'; bg.onload = finish; }
    }

    // تحميل الصور الافتراضية للبطاقة
    avatarManImg = new Image();
    avatarWomanImg = new Image();
    avatarManImg.onload = () => render();
    avatarWomanImg.onload = () => render();
    avatarManImg.src = 'cards/man.png';
    avatarWomanImg.src = 'cards/womon.png';

    // Init
    setOrientation('h');
  </script>
</body>
</html>
